<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Broken Selector Test</title>
<style>
  body { font-family: sans-serif; padding: 24px; max-width: 600px; margin: 0 auto; }
  .btn { padding: 8px 16px; background: #007bff; color: #fff; border: none; cursor: pointer; }
  .form-group { margin-bottom: 16px; }
  .form-label { display: block; margin-bottom: 4px; font-weight: 600; }
  .form-input { padding: 8px; width: 100%; }
</style>
</head>
<body>
  <h1>Broken Selector Diagnostic</h1>

  <!-- Button without data-testid — relies on unstable class name -->
  <button class="btn btn-primary">Submit</button>

  <!-- Input without data-testid or label -->
  <div class="form-group">
    <span class="form-label">Email</span>
    <input type="email" class="form-input" placeholder="Enter email">
  </div>

  <!-- Element with generated class name that changes -->
  <div class="sc-bdVaJa sc-bwzfAH sc-htpNat eIEXlr">
    This wrapper uses generated class names.
  </div>

  <!-- Intentionally missing selector: no element with data-testid="missing-cta" -->
  <p>The expected CTA selector is absent from this page.</p>
</body>
</html>
