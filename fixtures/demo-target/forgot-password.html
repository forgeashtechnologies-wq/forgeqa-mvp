<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; max-width: 400px; margin: 60px auto; padding: 20px; }
  h1 { font-size: 24px; margin-bottom: 16px; }
  label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 14px; }
  input { width: 100%; padding: 10px; font-size: 16px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; margin-bottom: 16px; }
  button { width: 100%; padding: 12px; font-size: 16px; background: #0d6efd; color: #fff; border: none; border-radius: 6px; cursor: pointer; }
  button:hover { background: #0b5ed7; }
  .confirmation { display: none; margin-top: 20px; padding: 16px; background: #d1e7dd; border: 1px solid #badbcc; border-radius: 6px; color: #0f5132; }
  .confirmation.visible { display: block; }
</style>
</head>
<body>
  <h1>Forgot Password</h1>
  <form id="reset-form" data-testid="reset-form">
    <label for="email">Email address</label>
    <input type="email" id="email" data-testid="reset-email-input" placeholder="you@example.com" required>
    <button type="submit" data-testid="reset-submit">Send Reset Link</button>
  </form>
  <div id="confirmation" class="confirmation" data-testid="reset-confirmation">
    <strong>Check your email</strong> If an account exists, a reset link has been sent. (Demo: no real email sent.)
  </div>
  <script>
    document.getElementById('reset-form').addEventListener('submit', function(e) {
      e.preventDefault();
      document.getElementById('confirmation').classList.add('visible');
    });
  </script>
</body>
</html>
