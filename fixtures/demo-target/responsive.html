<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Check</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }

  .page { min-height: 100vh; }

  /* Navigation */
  .nav-bar {
    background: #1a1a2e;
    color: #fff;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .desktop-nav {
    display: flex;
    gap: 24px;
    align-items: center;
  }
  .desktop-nav a {
    color: #fff;
    text-decoration: none;
    font-size: 14px;
  }

  .mobile-nav {
    display: none;
    align-items: center;
    justify-content: space-between;
    width: 100%;
  }

  .menu-btn {
    background: none;
    border: none;
    color: #fff;
    font-size: 24px;
    cursor: pointer;
    padding: 4px 8px;
  }

  /* Mobile menu overlay */
  .mobile-menu {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #1a1a2e;
    z-index: 100;
    padding: 60px 24px 24px;
  }
  .mobile-menu.open {
    display: block;
  }
  .mobile-menu a {
    display: block;
    color: #fff;
    text-decoration: none;
    font-size: 18px;
    padding: 12px 0;
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }
  .mobile-menu .close-btn {
    position: absolute;
    top: 16px;
    right: 16px;
    background: none;
    border: none;
    color: #fff;
    font-size: 28px;
    cursor: pointer;
  }

  /* Hero */
  .hero {
    padding: 60px 24px;
    text-align: center;
    background: #f8f9fa;
  }
  .hero h1 { font-size: 36px; margin-bottom: 16px; color: #1a1a2e; }
  .hero p { font-size: 18px; color: #6c757d; }

  /* Responsive breakpoint at 768px */
  @media (max-width: 768px) {
    .desktop-nav { display: none !important; }
    .mobile-nav { display: flex !important; }
    .hero { padding: 40px 16px; }
    .hero h1 { font-size: 24px; }
    .hero p { font-size: 16px; }
  }
</style>
</head>
<body>
  <div class="page" data-testid="responsive-page">
    <nav class="nav-bar">
      <div class="desktop-nav" data-testid="desktop-nav">
        <a href="#">Home</a>
        <a href="#">Products</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
      </div>
      <div class="mobile-nav" data-testid="mobile-nav">
        <span>Menu</span>
        <button class="menu-btn" data-testid="menu-button" onclick="document.getElementById('mobileMenu').classList.add('open')">&#9776;</button>
      </div>
    </nav>

    <div id="mobileMenu" class="mobile-menu" data-testid="menu-opened">
      <button class="close-btn" onclick="document.getElementById('mobileMenu').classList.remove('open')">&times;</button>
      <a href="#">Home</a>
      <a href="#">Products</a>
      <a href="#">About</a>
      <a href="#">Contact</a>
    </div>

    <section class="hero" data-testid="hero-section">
      <h1>Responsive Demo</h1>
      <p>This page changes layout based on viewport width. Resize your browser to see the difference.</p>
    </section>
  </div>
</body>
</html>
