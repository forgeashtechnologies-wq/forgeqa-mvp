<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>File Upload</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; max-width: 500px; margin: 60px auto; padding: 20px; }
  h1 { font-size: 24px; margin-bottom: 16px; }
  .upload-area { border: 2px dashed #ccc; border-radius: 8px; padding: 40px; text-align: center; margin-bottom: 20px; }
  .upload-area:hover { border-color: #0d6efd; }
  input[type="file"] { display: none; }
  .file-label { display: inline-block; padding: 12px 20px; background: #0d6efd; color: #fff; border-radius: 6px; cursor: pointer; }
  .preview { display: none; margin-top: 20px; }
  .preview.visible { display: block; }
  .preview img { max-width: 100%; border-radius: 6px; border: 1px solid #dee2e6; }
  .file-name { margin-top: 8px; font-size: 14px; color: #6c757d; }
</style>
</head>
<body>
  <h1>File Upload</h1>
  <div class="upload-area" data-testid="upload-area">
    <label for="fileInput" class="file-label">Choose File</label>
    <input type="file" id="fileInput" data-testid="file-input" accept="image/*">
    <p>Drag and drop or click to upload</p>
  </div>

  <div id="preview" class="preview" data-testid="file-preview">
    <img id="previewImg" alt="Preview">
    <div id="fileName" class="file-name" data-testid="file-name"></div>
  </div>

  <script>
    const input = document.getElementById('fileInput');
    const preview = document.getElementById('preview');
    const previewImg = document.getElementById('previewImg');
    const fileName = document.getElementById('fileName');

    input.addEventListener('change', function() {
      const file = input.files[0];
      if (!file) return;
      preview.classList.add('visible');
      fileName.textContent = file.name;
      if (file.type.startsWith('image/')) {
        const reader = new FileReader();
        reader.onload = function(e) {
          previewImg.src = e.target.result;
        };
        reader.readAsDataURL(file);
      } else {
        previewImg.style.display = 'none';
      }
    });
  </script>
</body>
</html>
