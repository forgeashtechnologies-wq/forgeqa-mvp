<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multi-Step Form</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; max-width: 500px; margin: 40px auto; padding: 20px; }
  h1 { font-size: 22px; margin-bottom: 12px; }
  .step-indicator { color: #6c757d; font-size: 14px; margin-bottom: 16px; }
  label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 14px; }
  input { width: 100%; padding: 10px; font-size: 16px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; margin-bottom: 12px; }
  .error { display: none; color: #dc3545; font-size: 14px; margin-bottom: 12px; }
  .error.visible { display: block; }
  button { padding: 12px 20px; font-size: 16px; background: #0d6efd; color: #fff; border: none; border-radius: 6px; cursor: pointer; margin-right: 8px; }
  button:hover { background: #0b5ed7; }
  .success { display: none; margin-top: 20px; padding: 16px; background: #d1e7dd; border: 1px solid #badbcc; border-radius: 6px; color: #0f5132; }
  .success.visible { display: block; }
</style>
</head>
<body>
  <h1>Multi-Step Form</h1>
  <div class="step-indicator" data-testid="step-indicator">Step 1 of 2</div>

  <div id="step1" data-testid="step-1">
    <label for="firstName">First Name</label>
    <input type="text" id="firstName" data-testid="first-name-input" placeholder="Jane">

    <label for="lastName">Last Name</label>
    <input type="text" id="lastName" data-testid="last-name-input" placeholder="Doe">

    <label for="email">Email</label>
    <input type="email" id="email" data-testid="email-input" placeholder="jane@example.com">

    <div id="validation-errors" class="error" data-testid="validation-errors">Please fill in all required fields.</div>

    <button type="button" data-testid="next-btn">Next</button>
  </div>

  <div id="step2" data-testid="step-2" style="display:none;">
    <label for="phone">Phone Number</label>
    <input type="tel" id="phone" data-testid="phone-input" placeholder="+1 555-123-4567">

    <button type="button" data-testid="submit-btn">Submit</button>
  </div>

  <div id="success-message" class="success" data-testid="success-message">
    <strong>Success!</strong> Your form has been submitted.
  </div>

  <script>
    const nextBtn = document.querySelector('[data-testid="next-btn"]');
    const submitBtn = document.querySelector('[data-testid="submit-btn"]');
    const step1 = document.getElementById('step1');
    const step2 = document.getElementById('step2');
    const errors = document.getElementById('validation-errors');
    const success = document.getElementById('success-message');
    const indicator = document.querySelector('[data-testid="step-indicator"]');

    nextBtn.addEventListener('click', function() {
      const fn = document.getElementById('firstName').value.trim();
      const ln = document.getElementById('lastName').value.trim();
      const em = document.getElementById('email').value.trim();
      if (!fn || !ln || !em) {
        errors.classList.add('visible');
        return;
      }
      errors.classList.remove('visible');
      step1.style.display = 'none';
      step2.style.display = 'block';
      indicator.textContent = 'Step 2 of 2';
    });

    submitBtn.addEventListener('click', function() {
      step2.style.display = 'none';
      indicator.style.display = 'none';
      success.classList.add('visible');
    });
  </script>
</body>
</html>
